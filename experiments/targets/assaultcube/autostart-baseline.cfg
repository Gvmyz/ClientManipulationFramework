// AssaultCube autostart config for thesis baseline captures.
//
// Deploy to (on the lab VM):
//   %USERPROFILE%\Documents\My Games\AssaultCube\v1.3\config\autostart\
// e.g. copy over the Hyper-V SMB share:
//   Copy-Item Z:\ClientManipulationFramework\experiments\targets\assaultcube\autostart-baseline.cfg `
//             "$env:USERPROFILE\Documents\My Games\AssaultCube\v1.3\config\autostart\"
//
// Files in autostart/ are executed by ac_client.exe on launch, after the
// install-dir defaults. That gives us a deterministic "launch → in a bot
// match" flow with zero user input, which is what the baseline needs.
//
// Goals:
//   - Predictable environment: windowed, small resolution, no music, sound
//     kept on so the audio thread runs (part of the noise floor).
//   - Straight into a local bot match with a fixed number of bots. This
//     exercises the render loop, physics tick, AI, weapon system, entity
//     list, and network stack (local ENet) — the same code paths a real
//     cheat would attack.
//   - Small delay before startbotmap so the client is fully initialised
//     before the map load runs.

// --- Display / audio: keep runs reproducible across boots ---
fullscreen 0            // windowed — doesn't steal focus / hide the framework console
screenres 800 600       // small, fixed — same pixel budget every run
musicvol 0              // mute music (repetitive over n=30)
soundvol 128            // keep SFX audible so the audio thread actually runs
maxfps 60               // clamp frame rate — deterministic event volume

// --- Bot-match kick-off ---
// startbotmap: AC's dedicated wrapper for "launch a single-player match with
// bots". Uses the currently-loaded gamemode + map, or defaults if none set.
// We set mode + map explicitly first to avoid depending on whatever the last
// session left in saved.cfg.
//
// Mode 10 = BotDeathmatch (BDM) in AC 1.3 — a bot-supporting mode.
// Map ac_desert is a small, popular built-in map with fast round starts.
//
// sleep <ms> [ ... ] queues the command block to run after N milliseconds.
// 1500ms gives the client time to finish autoexec + open the initial menu
// before we jump into a match; without this the map load can race the
// initialisation and drop us at the main menu instead.
sleep 1500 [
    mode 10
    map ac_desert
    // Add extra bots after the match is up. AC seeds a couple by default;
    // more bots => more entities => more game-side activity to observe.
    sleep 2000 [
        addbot
        addbot
        addbot
    ]
]
