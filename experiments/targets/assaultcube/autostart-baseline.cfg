// AssaultCube autostart config for thesis baseline captures.
//
// Deploy to (on the lab VM):
//   %USERPROFILE%\Documents\My Games\AssaultCube\v1.3\config\autostart\
//
// Files in autostart/ are executed by ac_client.exe on launch, after the
// install-dir defaults. That gives us a deterministic "launch → in a bot
// match" flow with zero user input.
//
// Design (learned through several failed iterations):
//   1. Setting tmp_mode/tmp_botmap in the outer file scope gets clobbered by
//      menus_bot.cfg's `tempalias tmp_mode ""` when it loads later during
//      init: cfg. Deferring the set into a `sleep` block fixes that half.
//   2. Even with tmp_* set correctly at the moment we call startbotmap,
//      SOMETHING inside the startbotmap → afterdisconnect → preparebotmatch
//      chain re-empties them before `map $tmp_botmap` actually executes.
//      Every failed attempt loaded a map from menus_bot.cfg's __bot_maps_all
//      fallback pool, not our ac_desert.
//   3. So this version skips startbotmap entirely and issues mode/map/bots
//      directly, mimicking what the menu chain ultimately does but with no
//      indirection through afterdisconnect / preparebotmatch / addOnLoadOnce.
//
// Reference: config/menus_bot.cfg in the AC install dir. Mode 8 = BDM.

echo "thesis-autostart: config loaded"

// --- Display + audio: deterministic environment across runs ---
fullscreen 0
screenres 800 600
musicvol 0
soundvol 128
maxfps 60

echo "thesis-autostart: display/audio applied"

// --- Direct botmatch bring-up ---
// --- Start the bot match after AC's initial local map has loaded ---

tempalias thesis_start_baseline [
  echo "thesis-autostart: initial map complete; launching baseline"

  tmp_mode = 8
  tmp_isbotteammode = 0
  tmp_botskill = good
  tmp_numbots = 4
  tmp_botmap = ac_desert
  menuBotGameLength = 30

  echo (concatword "thesis-autostart: tmp_mode='" $tmp_mode "'")
  echo (concatword "thesis-autostart: tmp_botmap='" $tmp_botmap "'")

  startbotmap
]

// The first map load is AC's automatic localconnect map.
// Wait until that load completes, then leave its callback before starting
// another map transition.
addOnLoadOnce [
  echo "thesis-autostart: initial map-load hook fired"

  sleep 250 [
    thesis_start_baseline
  ] 1
]

echo "thesis-autostart: waiting for initial map load"
